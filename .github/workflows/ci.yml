name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: ZombiePlagueLegacyCS2
            csproj: src/ZombiePlagueLegacyCS2/ZombiePlagueLegacyCS2.csproj
            output: ZombiePlagueLegacyCS2
            copy_economy: true
            copy_cookies: true
            copy_zpl_api: false
          - name: ZPLVIP
            csproj: src/zpl_vip/ZPLVIP.csproj
            output: ZPLVIP
            copy_economy: true
            copy_cookies: false
            copy_zpl_api: true
          - name: ZPLRank
            csproj: src/zpl_rank/ZPLRank.csproj
            output: ZPLRank
            copy_economy: false
            copy_cookies: false
            copy_zpl_api: true
          - name: ZPLFlashlight
            csproj: src/zpl_flashlight/ZPLFlashlight.csproj
            output: ZPLFlashlight
            copy_economy: false
            copy_cookies: false
            copy_zpl_api: true
          - name: ZPLDarkFog
            csproj: src/zpl_darkfog/ZPLDarkFog.csproj
            output: ZPLDarkFog
            copy_economy: false
          - name: ZPLTeamBets
            csproj: src/zpl_teambets/ZPLTeamBets.csproj
            output: ZPLTeamBets
            copy_economy: false
          - name: ZPLTags
            csproj: src/zpl_tags/ZPLTags.csproj
            output: ZPLTags
            copy_economy: false
            copy_cookies: true
          - name: ZPLMegaEvents
            csproj: src/zpl_megaevents/ZPLMegaEvents.csproj
            output: ZPLMegaEvents
            copy_economy: true
            copy_cookies: false
            copy_zpl_api: true


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore ${{ matrix.csproj }}

      - name: Build
        run: dotnet build ${{ matrix.csproj }} -c Release --no-restore

      - name: Publish
        run: dotnet publish ${{ matrix.csproj }} -c Release -f net10.0 --no-restore -o ${{ matrix.output }}

      - name: Copy Economy contract
        if: matrix.copy_economy
        run: cp src/ZombiePlagueLegacyCS2/lib/Economy.Contract.dll ${{ matrix.output }}/

      - name: Copy Cookies contract
        if: matrix.copy_cookies
        run: cp src/ZombiePlagueLegacyCS2/lib/Cookies.Contract.dll ${{ matrix.output }}/

      - name: Copy ZPL API contract
        if: matrix.copy_zpl_api
        run: |
          dotnet build src/IZombiePlagueLegacyAPI/IZombiePlagueLegacyAPI.csproj -c Release -o /tmp/zplapi
          cp /tmp/zplapi/ZombiePlagueLegacyAPI.dll ${{ matrix.output }}/

      - name: Package artifact
        run: zip -r ${{ matrix.name }}-net10.0.zip ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-net10.0
          path: ${{ matrix.name }}-net10.0.zip
