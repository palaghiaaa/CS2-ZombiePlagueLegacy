name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore src/ZombieOutstandingCS2/ZombieOutstandingCS2.csproj

      - name: Build
        run: dotnet build src/ZombieOutstandingCS2/ZombieOutstandingCS2.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/ZombieOutstandingCS2/ZombieOutstandingCS2.csproj -c Release -f net10.0 --no-restore -o ZombieOutstandingCS2

      - name: Copy Economy contract
        run: cp src/ZombieOutstandingCS2/lib/Economy.Contract.dll ZombieOutstandingCS2/

      - name: Package artifact
        run: zip -r ZombieOutstandingCS2-net10.0.zip ZombieOutstandingCS2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZombieOutstandingCS2-net10.0
          path: ZombieOutstandingCS2-net10.0.zip

