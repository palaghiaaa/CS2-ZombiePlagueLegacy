name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: ZombieOutstandingCS2
            csproj: src/ZombieOutstandingCS2/ZombieOutstandingCS2.csproj
            output: ZombieOutstandingCS2
            copy_economy: true
          - name: ZPOVIP
            csproj: src/zo_vip/ZPOVIP.csproj
            output: ZPOVIP
            copy_economy: true
          - name: ZORank
            csproj: src/zo_rank/ZORank.csproj
            output: ZORank
            copy_economy: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore ${{ matrix.csproj }}

      - name: Build
        run: dotnet build ${{ matrix.csproj }} -c Release --no-restore

      - name: Publish
        run: dotnet publish ${{ matrix.csproj }} -c Release -f net10.0 --no-restore -o ${{ matrix.output }}

      - name: Copy Economy contract
        if: matrix.copy_economy
        run: cp src/ZombieOutstandingCS2/lib/Economy.Contract.dll ${{ matrix.output }}/

      - name: Package artifact
        run: zip -r ${{ matrix.name }}-net10.0.zip ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-net10.0
          path: ${{ matrix.name }}-net10.0.zip
